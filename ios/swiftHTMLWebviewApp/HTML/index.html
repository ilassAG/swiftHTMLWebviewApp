<!-- Filename: HTML/index.html -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig für korrekte Skalierung und Verhinderung von Zoom auf iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Native Bridge Demo</title>
    <link rel="stylesheet" href="style.css?v=12">
    <!-- Verhindert das "Springen" beim Antippen von Elementen -->
    <style>
        * { -webkit-tap-highlight-color: transparent; }
    </style>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

</head>
<body>
    <div class="container">
        <h1>Native Bridge Demo</h1>

        <div class="controls">
            <button id="scanDocPdfBtn">Dokument Scannen (PDF mit OCR)</button>
            <button id="scanDocPngBtn">Dokument Scannen (PNG mit OCR)</button>
            <button id="takePhotoFrontBtn">Foto aufnehmen (Front)</button>
            <button id="takePhotoBackBtn">Foto aufnehmen (Rück)</button>
            <button id="portraitCaptureBtn">Passfoto aufnehmen</button>
            <div class="photo-options">
                <label class="photo-options-label" for="portraitCameraSelect">Passfoto Kamera:</label>
                <select id="portraitCameraSelect">
                    <option value="front" selected>Front</option>
                    <option value="back">Rück</option>
                </select>
                <label class="photo-options-label" for="portraitFacesInput">Gesichter:</label>
                <input type="number" id="portraitFacesInput" value="1" min="1" max="8" step="1">
                <label class="photo-options-label" for="portraitCountdownInput">Countdown s:</label>
                <input type="number" id="portraitCountdownInput" value="3" min="0" max="15" step="0.5">
                <label class="photo-options-label" for="portraitVariationInput">Varianten:</label>
                <input type="number" id="portraitVariationInput" value="4" min="1" max="8" step="1">
                <label class="photo-options-label" for="portraitIntervalInput">Burst ms:</label>
                <input type="number" id="portraitIntervalInput" value="200" min="50" max="2000" step="50">
                <label class="photo-options-label" for="portraitOutputTypeSelect">Format:</label>
                <select id="portraitOutputTypeSelect">
                    <option value="png" selected>PNG</option>
                    <option value="jpeg">JPEG</option>
                </select>
                <label class="photo-options-label" for="portraitCropSelect">Zuschnitt:</label>
                <select id="portraitCropSelect">
                    <option value="squareFaceCentered" selected>Gesicht mittig</option>
                    <option value="none">Kein Face-Crop</option>
                </select>
                <label class="photo-options-toggle">
                    <input type="checkbox" id="portraitRemoveBackgroundCheckbox" checked>
                    Hintergrund entfernen
                </label>
                <label class="photo-options-label" for="portraitBackgroundMode">Hintergrund:</label>
                <select id="portraitBackgroundMode">
                    <option value="transparent" selected>Transparent</option>
                    <option value="color">Farbe</option>
                </select>
                <input type="color" id="portraitBackgroundColor" value="#ffffff" disabled>
                <label class="photo-options-toggle photo-options-crop">
                    <input type="checkbox" id="portraitCropTransparentCheckbox">
                    Transparent zuschneiden
                </label>
                <label class="photo-options-toggle">
                    <input type="checkbox" id="portraitMirrorOutputCheckbox">
                    Ausgabe spiegeln
                </label>
            </div>
            <div class="photo-options">
                <label class="photo-options-toggle">
                    <input type="checkbox" id="removeBackgroundCheckbox">
                    Hintergrund entfernen
                </label>
                <label class="photo-options-label" for="photoBackgroundMode">Hintergrund:</label>
                <select id="photoBackgroundMode" disabled>
                    <option value="transparent">Transparent</option>
                    <option value="color">Farbe</option>
                </select>
                <input type="color" id="photoBackgroundColor" value="#ffffff" disabled>
                <label class="photo-options-toggle photo-options-crop">
                    <input type="checkbox" id="cropTransparentCheckbox" disabled>
                    Transparent zuschneiden
                </label>
            </div>
            <div class="printer-options">
                <label for="epsonPrinterHost">Epson Drucker</label>
                <input type="text" id="epsonPrinterHost" placeholder="192.0.2.10" inputmode="decimal">
            </div>
            <div class="printer-options">
                <label for="printerSelect">Gefunden</label>
                <select id="printerSelect" disabled>
                    <option value="">Noch nicht gesucht</option>
                </select>
            </div>
            <button id="discoverPrintersBtn">Drucker suchen</button>
            <button id="printEpsonHelloBtn">Hallo Welt drucken</button>
            <button id="confettiBtn">Konfetti!</button>
            <button id="scanBarcodeBtn">QR/EAN Scannen</button>
            <button id="nfcTagReadBtn">NFC Tag lesen</button>
            <div class="bridge-options">
                <label for="scannerModeSelect">Permanent Scan</label>
                <select id="scannerModeSelect">
                    <option value="data">Daten</option>
                    <option value="login">Login</option>
                </select>
                <select id="scannerCameraSelect">
                    <option value="back">Rückkamera</option>
                    <option value="front">Frontkamera</option>
                </select>
                <input type="number" id="scannerTopInput" value="18" min="0" max="90" step="1" aria-label="Scanner top percent">
                <input type="number" id="scannerLeftInput" value="10" min="0" max="90" step="1" aria-label="Scanner left percent">
                <input type="number" id="scannerWidthInput" value="80" min="10" max="100" step="1" aria-label="Scanner width percent">
                <input type="number" id="scannerHeightInput" value="36" min="10" max="100" step="1" aria-label="Scanner height percent">
            </div>
            <button id="permanentScanStartBtn">Permanent Scan starten</button>
            <button id="permanentScanUpdateBtn">Scan-Fenster setzen</button>
            <button id="permanentScanStopBtn">Permanent Scan stoppen</button>
            <div class="bridge-options">
                <label for="beaconUuidInput">iBeacon UUID</label>
                <input type="text" id="beaconUuidInput" placeholder="leer = Native Settings">
            </div>
            <button id="beaconsStartBtn">Beacons starten</button>
            <button id="beaconsStopBtn">Beacons stoppen</button>
            <div class="bridge-options">
                <label for="beaconAdvertiseUuidInput">iBeacon senden</label>
                <input type="text" id="beaconAdvertiseUuidInput" placeholder="leer = Native Settings">
                <input type="number" id="beaconAdvertiseMajorInput" value="1" min="0" max="65535" step="1" aria-label="iBeacon major">
                <input type="number" id="beaconAdvertiseMinorInput" value="1" min="0" max="65535" step="1" aria-label="iBeacon minor">
            </div>
            <button id="beaconAdvertiseStartBtn">iBeacon senden starten</button>
            <button id="beaconAdvertiseStopBtn">iBeacon senden stoppen</button>
            <div class="bridge-options">
                <label for="orientationSelect">Rotation</label>
                <select id="orientationSelect">
                    <option value="unlocked">Auto</option>
                    <option value="portrait">Portrait</option>
                    <option value="landscape">Landscape</option>
                    <option value="locked">Aktuell sperren</option>
                </select>
                <button id="orientationSetBtn" type="button">Rotation setzen</button>
            </div>
            <div class="bridge-options">
                <label for="wifiSsidInput">WLAN</label>
                <input type="text" id="wifiSsidInput" placeholder="SSID">
                <input type="password" id="wifiPasswordInput" placeholder="Passwort (leer für offenes WLAN)">
            </div>
            <button id="wifiConfigureBtn">Mit WLAN verbinden</button>
            <div class="config-panel">
                <h2>Config Pairing</h2>
                <div class="config-grid">
                    <label for="configPairingPayloadInput">Pairing</label>
                    <textarea id="configPairingPayloadInput" rows="4" placeholder="QR Payload oder Scan-Ergebnis"></textarea>
                    <label for="configSecurityTokenInput">Token</label>
                    <input type="password" id="configSecurityTokenInput" placeholder="in App-Einstellungen setzen" autocomplete="off">
                    <label for="configNewSecurityTokenInput">Neuer Token</label>
                    <input type="password" id="configNewSecurityTokenInput" placeholder="optional rotieren" autocomplete="off">
                    <label for="configAppUuidOutput">App UUID</label>
                    <input type="text" id="configAppUuidOutput" placeholder="auto" readonly>
                    <label for="configDeviceNameInput">Gerätename</label>
                    <input type="text" id="configDeviceNameInput" placeholder="z.B. Demo Tablet 03">
                    <label for="configDeviceUuidInput">Geräte UUID</label>
                    <input type="text" id="configDeviceUuidInput" placeholder="auto wenn leer">
                    <label for="configDeviceLocationInput">Standort</label>
                    <input type="text" id="configDeviceLocationInput" placeholder="z.B. Halle A / Eingang">
                    <label for="configServerUrlInput">URL 1</label>
                    <input type="text" id="configServerUrlInput" placeholder="local oder https://...">
                    <label for="configHaEnabledInput">Failover</label>
                    <label class="inline-check">
                        <input type="checkbox" id="configHaEnabledInput">
                        aktiv
                    </label>
                    <label for="configHaTimeoutInput">Timeout</label>
                    <input type="number" id="configHaTimeoutInput" value="5" min="1" max="120" step="1">
                    <label for="configUrl2Input">URL 2</label>
                    <input type="text" id="configUrl2Input" placeholder="optional">
                    <label for="configUrl3Input">URL 3</label>
                    <input type="text" id="configUrl3Input" placeholder="optional">
                    <label for="configUrl4Input">URL 4</label>
                    <input type="text" id="configUrl4Input" placeholder="optional">
                    <label for="configBeaconUuidInput">Beacon UUID</label>
                    <input type="text" id="configBeaconUuidInput" placeholder="7763A937-B779-4D31-A20C-49E83047048F">
                    <label for="configWifiSsidInput">Ziel-WLAN</label>
                    <input type="text" id="configWifiSsidInput" placeholder="SSID">
                    <label for="configWifiPasswordInput">Ziel-PW</label>
                    <input type="password" id="configWifiPasswordInput" placeholder="Passwort">
                </div>
                <div class="config-actions">
                    <button id="configPairingShowBtn" type="button">Pairing QR anzeigen</button>
                    <button id="configPairingStopBtn" type="button">Pairing QR schliessen</button>
                    <button id="configPairingScanBtn" type="button">Pairing QR live scannen</button>
                    <button id="configPairingConnectBtn" type="button">Config verbinden</button>
                    <button id="configPairingDisconnectBtn" type="button">Config trennen</button>
                    <button id="localSettingsGetBtn" type="button">Lokale Settings holen</button>
                    <button id="localSettingsSetBtn" type="button">Lokale Settings setzen</button>
                    <button id="configStatusBtn" type="button">Config Status</button>
                    <button id="configSettingsGetBtn" type="button">Settings holen</button>
                    <button id="configSettingsSetBtn" type="button">Settings setzen</button>
                    <button id="configWifiConfigureBtn" type="button">Ziel-WLAN setzen</button>
                    <button id="configReloadBtn" type="button">Ziel neu laden</button>
                </div>
            </div>
            <button id="deviceInfoBtn">Geräteinfos abrufen</button>
            <button id="wifiStatusBtn">WLAN Status</button>
            <button id="screenshotBtn">Screenshot holen</button>
            <button id="geoGetBtn">Standort holen</button>
            <button id="geoStartBtn">Standort live starten</button>
            <button id="geoStopBtn">Standort live stoppen</button>
            <button id="soundPlayBtn">Ton ausgeben</button>
            <button id="notificationPermissionBtn">Notification Rechte</button>
            <button id="notificationShowBtn">Notification jetzt</button>
            <button id="notificationScheduleBtn">Notification in 10s</button>
            <button id="notificationCancelBtn">Notifications löschen</button>
            <div class="bridge-options">
                <label for="idleTimeoutInput">Idle</label>
                <input type="number" id="idleTimeoutInput" value="30" min="1" max="3600" step="1" aria-label="Idle timeout seconds">
                <input type="number" id="idleIntervalInput" value="1" min="0.25" max="60" step="0.25" aria-label="Idle interval seconds">
            </div>
            <button id="idleStartBtn">Idle Timer starten</button>
            <button id="idleResetBtn">Idle Timer reset</button>
            <button id="idleStopBtn">Idle Timer stoppen</button>
            <button id="sensorCapabilitiesBtn">Sensoren anzeigen</button>
            <button id="sensorStartBtn">Sensoren live starten</button>
            <button id="sensorStopBtn">Sensoren live stoppen</button>
            <div class="bridge-options">
                <label for="screenStreamTargetInput">Screenstream</label>
                <input type="text" id="screenStreamTargetInput" placeholder="ws://192.0.2.10:18090/screen">
                <input type="number" id="screenStreamFpsInput" value="2" min="1" max="10" step="1" aria-label="Screenstream fps">
                <input type="number" id="screenStreamWidthInput" value="720" min="240" max="1920" step="10" aria-label="Screenstream max width">
            </div>
            <button id="screenStreamStartBtn">Screenstream starten</button>
            <button id="screenStreamStopBtn">Screenstream stoppen</button>
            <div class="native-demo-panel">
                <h2>NATS</h2>
                <div class="native-demo-grid">
                    <label for="natsUrlsInput">Server URLs</label>
                    <textarea id="natsUrlsInput" rows="3">tls://nats.example.invalid:4222</textarea>
                    <label for="natsCredentialInput">Credentials</label>
                    <textarea id="natsCredentialInput" rows="4" placeholder="-----BEGIN NATS USER JWT-----"></textarea>
                    <label for="natsSubjectInput">Publish Subject</label>
                    <input type="text" id="natsSubjectInput" placeholder="swift.wrapper.APP-UUID.events.demo">
                    <label for="natsPayloadInput">Publish JSON</label>
                    <textarea id="natsPayloadInput" rows="3">{"source":"native-bridge-demo","ok":true}</textarea>
                </div>
                <div class="native-demo-actions">
                    <button id="natsProvisionBtn" type="button">NATS provisionieren</button>
                    <button id="natsStatusBtn" type="button">NATS Status</button>
                    <button id="natsConnectBtn" type="button">NATS verbinden</button>
                    <button id="natsDisconnectBtn" type="button">NATS trennen</button>
                    <button id="natsPublishBtn" type="button">NATS publish</button>
                </div>
            </div>
            <div class="native-demo-panel">
                <h2>Native Persistence</h2>
                <div class="native-demo-grid">
                    <label for="storageNamespaceInput">Store Namespace</label>
                    <input type="text" id="storageNamespaceInput" value="demo">
                    <label for="storageKeyInput">Store Key</label>
                    <input type="text" id="storageKeyInput" value="station">
                    <label for="storageValueInput">Store JSON</label>
                    <textarea id="storageValueInput" rows="3">{"name":"Native Bridge Demo","counter":1}</textarea>
                </div>
                <div class="native-demo-actions">
                    <button id="storageSetBtn" type="button">Store setzen</button>
                    <button id="storageGetBtn" type="button">Store lesen</button>
                    <button id="storageRemoveBtn" type="button">Store entfernen</button>
                    <button id="storageClearBtn" type="button">Namespace löschen</button>
                </div>
                <div class="native-demo-grid">
                    <label for="fileDirectorySelect">Datei Bereich</label>
                    <select id="fileDirectorySelect">
                        <option value="data" selected>Data</option>
                        <option value="cache">Cache</option>
                        <option value="temporary">Temporary</option>
                    </select>
                    <label for="filePathInput">Datei Pfad</label>
                    <input type="text" id="filePathInput" value="demo/state.json">
                    <label for="fileDataInput">Datei Inhalt</label>
                    <textarea id="fileDataInput" rows="3">{"offline":true,"updatedBy":"demo"}</textarea>
                </div>
                <div class="native-demo-actions">
                    <button id="fileWriteBtn" type="button">Datei schreiben</button>
                    <button id="fileReadBtn" type="button">Datei lesen</button>
                    <button id="fileListBtn" type="button">Ordner listen</button>
                    <button id="fileDeleteBtn" type="button">Datei löschen</button>
                </div>
                <div class="native-demo-grid">
                    <label for="sqliteDatabaseInput">SQLite DB</label>
                    <input type="text" id="sqliteDatabaseInput" value="demo.sqlite">
                    <label for="sqliteKeyInput">SQLite Key</label>
                    <input type="text" id="sqliteKeyInput" value="station">
                    <label for="sqliteValueInput">SQLite Value</label>
                    <input type="text" id="sqliteValueInput" value="Demo Terminal">
                </div>
                <div class="native-demo-actions">
                    <button id="sqliteInitBtn" type="button">SQLite init</button>
                    <button id="sqliteUpsertBtn" type="button">SQLite upsert</button>
                    <button id="sqliteListBtn" type="button">SQLite lesen</button>
                    <button id="sqliteDeleteDbBtn" type="button">SQLite DB löschen</button>
                </div>
            </div>
            <div class="native-demo-panel">
                <h2>Kiosk Reload Control</h2>
                <div class="native-demo-grid">
                    <label for="kioskOpacityInput">Opacity</label>
                    <input type="number" id="kioskOpacityInput" value="0.1" min="0.02" max="1" step="0.02">
                    <label for="kioskLongPressInput">Long Press s</label>
                    <input type="number" id="kioskLongPressInput" value="2" min="0.5" max="10" step="0.5">
                </div>
                <div class="native-demo-actions">
                    <button id="kioskReloadEnableBtn" type="button">Reload Button ein</button>
                    <button id="kioskReloadDisableBtn" type="button">Reload Button aus</button>
                </div>
            </div>
            <button id="clearResultBtn">Ergebnis löschen</button>
        </div>

        <div class="results">
            <h2>Ergebnis:</h2>
            <div id="statusArea" class="status loading" style="display: none;">
                <p>Aktion wird ausgeführt...</p>
                <div class="spinner"></div>
            </div>
            <div id="resultArea">
                <p id="placeholderText">Noch keine Aktion ausgeführt.</p>
                <!-- Hier werden Ergebnisse dynamisch eingefügt -->
            </div>
            <h2>Live Events:</h2>
            <div id="eventLog" class="event-log">
                <p class="muted">Noch keine Scanner- oder Beacon-Events.</p>
            </div>
        </div>
    </div>

    <script src="script.js?v=12"></script>
</body>
</html>
